<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Progress Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f5f3ef;
  color: #1a1410;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px 80px;
}

.container {
  width: 100%;
  max-width: 900px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 0.04em;
  text-align: center;
  margin-bottom: 28px;
  background: linear-gradient(130deg, #ff4500, #ff8c00, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(255,100,0,0.2));
}

/* STAT CARDS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: #ffffff;
  border-radius: 16px;
  padding: 20px 18px;
  text-align: center;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  border: 1px solid #eee8e0;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #ff4500, #ffd700);
}

.stat-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #b0a090;
  margin-bottom: 8px;
}

.stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 0.03em;
  color: #1a1410;
}

.stat-sub {
  font-size: 12px;
  margin-top: 4px;
  color: #b0a090;
}

/* CHART CARD */
.chart-card {
  background: #ffffff;
  border-radius: 20px;
  padding: 28px 28px 22px;
  box-shadow: 0 2px 24px rgba(0,0,0,0.09);
  border: 1px solid #eee8e0;
}

.legend {
  display: flex;
  gap: 20px;
  margin-bottom: 18px;
  font-size: 13px;
  color: #7a6a5a;
}

.legend span {
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 500;
}

.leg-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.chart-wrapper {
  position: relative;
  width: 100%;
  height: 340px;
}

/* BACK BUTTON */
.back-wrap {
  text-align: center;
  margin-top: 28px;
}

.back-btn {
  padding: 14px 36px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(130deg, #ff4500, #ff8c00);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.06em;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(255,80,0,0.3);
  text-decoration: none;
  display: inline-block;
}

.back-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(255,80,0,0.45);
}

@media (max-width: 540px) {
  .stats { grid-template-columns: 1fr; }
  h1 { font-size: 40px; }
}

</style>
</head>
<body>

<div class="container">

  <h1>📈 Weight Progress</h1>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Current Weight</div>
      <div class="stat-value">69 kg</div>
      <div class="stat-sub" style="color:#ef4444;">+21 kg from start</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lowest Recorded</div>
      <div class="stat-value">36 kg</div>
      <div class="stat-sub">Entries 2 &amp; 4</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Average Weight</div>
      <div class="stat-value">51.4 kg</div>
      <div class="stat-sub">Over 5 entries</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="legend">
      <span><span class="leg-dot" style="background:#ff8c00;"></span>Weight (kg)</span>
      <span><span class="leg-dot" style="background:#3b82f6; opacity:0.7;"></span>Trend line</span>
    </div>
    <div class="chart-wrapper">
      <canvas id="weightChart"></canvas>
    </div>
  </div>

  <div class="back-wrap">
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

const labels  = ['Entry 1','Entry 2','Entry 3','Entry 4','Entry 5'];
const weights = [48, 36, 68, 36, 69];

const n = weights.length;
const sumX  = weights.reduce((a,_,i) => a+i, 0);
const sumY  = weights.reduce((a,v)   => a+v, 0);
const sumXY = weights.reduce((a,v,i) => a+i*v, 0);
const sumX2 = weights.reduce((a,_,i) => a+i*i, 0);
const slope     = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
const intercept = (sumY - slope*sumX) / n;
const trendData = weights.map((_,i) => parseFloat((slope*i+intercept).toFixed(1)));

new Chart(document.getElementById('weightChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Weight (kg)',
        data: weights,
        borderColor: '#ff8c00',
        backgroundColor: 'rgba(255,140,0,0.08)',
        borderWidth: 3,
        pointBackgroundColor: '#ff8c00',
        pointBorderColor: '#fff',
        pointBorderWidth: 2.5,
        pointRadius: 7,
        pointHoverRadius: 10,
        fill: true,
        tension: 0.4
      },
      {
        label: 'Trend',
        data: trendData,
        borderColor: 'rgba(59,130,246,0.6)',
        borderWidth: 2,
        borderDash: [8,5],
        pointRadius: 0,
        fill: false,
        tension: 0
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1410',
        titleColor: '#ffd700',
        bodyColor: '#e8d8c8',
        borderColor: 'rgba(255,140,0,0.3)',
        borderWidth: 1,
        padding: 12,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} kg`
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: { color: '#9a8878', font:{ size:13, family:'DM Sans' } },
        border: { color: 'rgba(0,0,0,0.1)' }
      },
      y: {
        min: 28, max: 80,
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: {
          color: '#9a8878',
          font: { size:13, family:'DM Sans' },
          callback: v => v + ' kg'
        },
        border: { color: 'rgba(0,0,0,0.1)' }
      }
    }
  }
});

</script>
</body>
</html>
